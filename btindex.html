<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - TVU</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome cho icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .login-card { max-width: 450px; border-radius: 10px; border: 1px solid #ddd; }
        .btn-ms { background-color: #0078d4; color: white; }
        .btn-ms:hover { background-color: #005a9e; color: white; }
    </style>
</head>
<body class="d-flex align-items-center vh-100">

<div class="container">
    <div class="card login-card mx-auto shadow-sm p-4">
        <div class="text-center mb-3">
            <!-- Logo TVU (Tham chiếu 1000013510.jpg) -->
            <img src="c:\Users\Hoc vien\Downloads\TVU-RGB.png" alt="Logo" style="width: 80px;">
            <h6 class="mt-3 mb-1 fw-bold">PHẦN MỀM TIN HỌC</h6>
            <p class="small fw-bold">ĐÁNH GIÁ KẾT QUẢ RÈN LUYỆN CHO SINH VIÊN CHÍNH QUY <br> TẠI ĐẠI HỌC TRÀ VINH</p>
        </div>

        <hr>

        <form>
            <div class="input-group mb-3">
                <input type="text" class="form-control" placeholder="Email">
                <span class="input-group-text"><i class="fas fa-envelope text-secondary"></i></span>
            </div>
            <div class="input-group mb-3">
                <input type="password" class="form-control" placeholder="Mật khẩu">
                <span class="input-group-text"><i class="fas fa-lock text-secondary"></i></span>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="remember">
                    <label class="form-check-label" for="remember">Nhớ mật khẩu</label>
                </div>
                <button type="submit" class="btn btn-primary px-4">Đăng nhập</button>
            </div>

            <div class="d-grid gap-2">
                <button type="button" class="btn btn-ms">Sinh viên (Đăng nhập bằng Email Microsoft)</button>
                <button type="button" class="btn btn-danger">Giảng viên (Đăng nhập bằng Email TVU)</button>
            </div>
        </form>

        <div class="mt-3">
            <a href="#" class="text-decoration-none small">Quên mật khẩu?</a>
        </div>
    </div>
</div>

</body>
</html>
