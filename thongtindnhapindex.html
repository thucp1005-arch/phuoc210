<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin đăng ký</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f1f3f5; padding: 2rem 0; }
        .reg-container { max-width: 850px; background: white; border-radius: 15px; overflow: hidden; }
        .reg-header { background-color: #8eb54d; padding: 20px; text-align: center; }
        /* Style input dạng gạch chân như trong mẫu 1000013511.jpg */
        .underline-input {
            border: none;
            border-bottom: 1px solid #333;
            border-radius: 0;
            padding-left: 0;
        }
        .underline-input:focus {
            box-shadow: none;
            border-bottom: 2px solid #8eb54d;
        }
        .btn-custom { background-color: #8eb54d; border: 1px solid #333; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="reg-container mx-auto shadow">
        <div class="reg-header">
            <h2 class="mb-0">Thông tin đăng ký</h2>
        </div>
       
        <div class="p-5">
            <form>
                <!-- Họ tên -->
                <div class="row mb-3 align-items-center">
                    <label class="col-sm-2 col-form-label">Họ tên:</label>
                    <div class="col-sm-10">
                        <input type="text" class="form-control underline-input" placeholder="Nhập họ tên">
                    </div>
                </div>

                <!-- Ngày sinh & Giới tính -->
                <div class="row mb-3 align-items-center">
                    <label class="col-sm-2 col-form-label">Ngày sinh:</label>
                    <div class="col-sm-4">
                        <input type="date" class="form-control underline-input">
                    </div>
                    <label class="col-sm-2 col-form-label ps-4">Giới tính:</label>
                    <div class="col-sm-4">
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="gender" id="nam">
                            <label class="form-check-label" for="nam">Nam</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="gender" id="nu">
                            <label class="form-check-label" for="nu">Nữ</label>
                        </div>
                    </div>
                </div>

                <!-- Địa chỉ -->
                <div class="row mb-3 align-items-center">
                    <label class="col-sm-2 col-form-label">Địa chỉ:</label>
                    <div class="col-sm-10">
<input type="text" class="form-control underline-input" placeholder="Nhập địa chỉ">
                    </div>
                </div>

                <!-- MSSV & Lớp -->
                <div class="row mb-3 align-items-center">
                    <label class="col-sm-2 col-form-label">MSSV:</label>
                    <div class="col-sm-4">
                        <input type="text" class="form-control underline-input" placeholder="Nhập mã số sinh viên">
                    </div>
                    <label class="col-sm-2 col-form-label ps-4">Lớp:</label>
                    <div class="col-sm-4">
                        <select class="form-select underline-input">
                            <option selected>DA25TTA</option>
                            <option value="1">DA24TTB</option>
                            <option value="2">DA24TTC</option>
                            <option value="3">DA24TTD</option>
                        </select>
                    </div>
                </div>

                <!-- SĐT & Email -->
                <div class="row mb-3 align-items-center">
                    <label class="col-sm-2 col-form-label">Số điện thoại:</label>
                    <div class="col-sm-4">
                        <input type="tel" class="form-control underline-input" placeholder="Nhập số điện thoại">
                    </div>
                    <label class="col-sm-2 col-form-label ps-4">Email:</label>
                    <div class="col-sm-4">
                        <input type="email" class="form-control underline-input" placeholder="Nhập email">
                    </div>
                </div>

                <!-- Ảnh đại diện -->
                <div class="row mb-3 align-items-center">
                    <label class="col-sm-2 col-form-label">Ảnh đại diện:</label>
                    <div class="col-sm-10">
                        <input type="file" class="form-control underline-input">
                    </div>
                </div>

                <!-- Sở trường -->
                <div class="row mb-3">
                    <label class="col-sm-2 col-form-label">Sở trường:</label>
                    <div class="col-sm-10 pt-2">
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" id="tkweb">
                            <label class="form-check-label" for="tkweb">Thiết kế web</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" id="ltweb">
                            <label class="form-check-label" for="ltweb">Lập trình web</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="checkbox" id="tiengtrung">
                            <label class="form-check-label" for="tiengtrung">Thành thạo tiếng Trung</label>
</div>
                    </div>
                </div>

                <!-- Mô tả -->
                <div class="mb-4">
                    <label class="form-label">Mô tả sơ lược:</label>
                    <textarea class="form-control" rows="4" style="border: 1px solid #333;"></textarea>
                </div>

                <!-- Nút bấm -->
                <div class="text-center">
                    <button type="reset" class="btn btn-custom px-4 me-2">Hủy bỏ</button>
                    <button type="submit" class="btn btn-custom px-4">Đăng ký</button>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
